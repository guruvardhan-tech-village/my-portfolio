<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Circular Spinner | Internship Project</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --white: #ffffff;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents page scroll while spinning gallery */
        }

        h1 { margin-bottom: 50px; font-weight: 300; letter-spacing: 2px; }

        /* 3D Scene Setup */
        .container {
            width: 200px;
            height: 250px;
            position: relative;
            perspective: 1000px; /* Gives the 3D depth effect */
        }

        #spinner {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Individual Image Cards */
        .img-card {
            position: absolute;
            width: 190px;
            height: 240px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            background: #000;
        }

        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.5s;
        }

        /* Position images in a circle (6 images = 60 degrees each) */
        /* translateZ(300px) pushes them out from the center */
        .img-card:nth-child(1) { transform: rotateY(0deg) translateZ(300px); }
        .img-card:nth-child(2) { transform: rotateY(60deg) translateZ(300px); }
        .img-card:nth-child(3) { transform: rotateY(120deg) translateZ(300px); }
        .img-card:nth-child(4) { transform: rotateY(180deg) translateZ(300px); }
        .img-card:nth-child(5) { transform: rotateY(240deg) translateZ(300px); }
        .img-card:nth-child(6) { transform: rotateY(300deg) translateZ(300px); }

        /* Navigation Buttons */
        .nav-controls {
            margin-top: 100px;
            display: flex;
            gap: 40px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <h1>Interactive 3D Carousel</h1>

    <div class="container">
        <div id="spinner">
            <div class="img-card"><img src="https://picsum.photos/id/101/200/300"></div>
            <div class="img-card"><img src="https://picsum.photos/id/102/200/300"></div>
            <div class="img-card"><img src="https://picsum.photos/id/103/200/300"></div>
            <div class="img-card"><img src="https://picsum.photos/id/104/200/300"></div>
            <div class="img-card"><img src="https://picsum.photos/id/106/200/300"></div>
            <div class="img-card"><img src="https://picsum.photos/id/107/200/300"></div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="btn" onclick="rotate('prev')">Prev</button>
        <button class="btn" onclick="rotate('next')">Next</button>
    </div>

    <footer>
        GURUVARDHANA M [cite: 1] | EAST WEST INSTITUTE OF TECHNOLOGY [cite: 2] | Ethnotech PVT Ltd Intern [cite: 4]
    </footer>

    <script>
        let currAngle = 0;
        const spinner = document.getElementById("spinner");

        // Feature 1: Rotation Logic for Buttons
        function rotate(direction) {
            if (direction === 'next') {
                currAngle -= 60; // 360 / 6 images = 60 degrees
            } else {
                currAngle += 60;
            }
            spinner.style.transform = `rotateY(${currAngle}deg)`;
        }

        // Feature 2: Mouse Wheel Support
        window.addEventListener("wheel", (e) => {
            if (e.deltaY > 0) {
                currAngle -= 60;
            } else {
                currAngle += 60;
            }
            spinner.style.transform = `rotateY(${currAngle}deg)`;
        });
    </script>
</body>
</html>
